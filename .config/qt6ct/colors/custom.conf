* {
    background-color: #111318;
    color: #e2e2e9;
    border-radius: 10px;
}

QLineEdit {
    background-color: #1e1f25;
    color: #e2e2e9;
    border: none;
    border-bottom: 2px solid #adc6ff;
    padding: 10px 16px;
    font-family: "Adwaita Mono", "JetBrainsMono Nerd Font", monospace;
    font-size: 14px;
}

QLineEdit:focus {
    border-bottom: 2px solid #adc6ff;
}

QLabel {
    color: #e2e2e9;
    background-color: transparent;
    font-family: "Adwaita Mono", "JetBrainsMono Nerd Font", monospace;
    font-size: 14px;
}

QPushButton {
    background-color: #1e1f25;
    color: #e2e2e9;
    border: 1px solid #44474f;
    border-radius: 6px;
    padding: 8px 20px;
    font-family: "Adwaita Mono", "JetBrainsMono Nerd Font", monospace;
}

QPushButton:hover {
    background-color: #282a2f;
    border: 1px solid #adc6ff;
}

QPushButton:pressed {
    background-color: #adc6ff;
    color: #111318;
}
