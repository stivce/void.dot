# Autostart — daemons start only if not already running (safe on reload)
exec-once = bash -c 'pgrep -x hypridle || hypridle'
exec-once = bash -c 'pgrep -x hyprpolkitagent || hyprpolkitagent'
exec-once = bash -c 'pgrep -x awww-daemon || { awww-daemon --format xrgb & sleep 0.5; awww img $HOME/Pictures/wallpapers/minimalno.png; }'
exec-once = bash -c 'pgrep -x waybar || waybar'
exec-once = walker --gapplication-service
