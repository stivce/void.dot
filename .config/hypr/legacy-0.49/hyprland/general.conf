general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(ffffff)
    col.inactive_border = rgba(808080b3) rgba(ffffffb3) 45deg
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.97
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        ignore_opacity = true
        new_optimizations = true
        vibrancy = 0.17
    }
}

layerrule {
    name = blur_waybar
    match:namespace = waybar
    blur = true
}

layerrule {
    name = blur_launcher
    match:namespace = launcher
    blur = true
}

layerrule {
    name = blur_wofi
    match:namespace = wofi
    blur = true
}

layerrule {
    name = blur_swaync_notifications
    match:namespace = swaync-notification-window
    blur = true
    ignore_alpha = 0.0
}

layerrule {
    name = blur_swaync_control_center
    match:namespace = swaync-control-center
    blur = true
    ignore_alpha = 0.0
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    preserve_split = true
}

 master {
     new_status = master
 }

 cursor {
     no_hardware_cursors = true
 }

 misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_autoreload = true
}

windowrule = match:class looking-glass-client, opacity 1 override

windowrule = match:class zen, opacity 1 override

windowrule = match:class helium, opacity 1 override

# Disable transparency for fullscreen windows (games, video, etc.)
windowrule = match:fullscreen true, opacity 1 override

# Allow WoW to be centered, fullscreen, and fix shaking
windowrule = match:title ^World of Warcraft$, workspace e+1
windowrule = match:title ^World of Warcraft$, float on
windowrule = match:title ^World of Warcraft$, fullscreen on
windowrule = match:title ^World of Warcraft$, immediate on
